services:
  jenkins:
    build:
      context: ./jenkins
      dockerfile: Dockerfile
    container_name: greencity-jenkins
    restart: unless-stopped
    privileged: true
    user: root
    environment:
      JAVA_OPTS: >-
        -Djenkins.install.runSetupWizard=false
        -Dhudson.model.DirectoryBrowserSupport.CSP=
      CASC_JENKINS_CONFIG: /var/jenkins_conf/jenkins.casc.yml
      SONAR_HOST_URL: http://sonarqube:9000
      JENKINS_ADMIN_ID: ${JENKINS_ADMIN_ID:-admin}
      JENKINS_ADMIN_PASSWORD: ${JENKINS_ADMIN_PASSWORD:-admin}
    ports:
      - "8081:8080"
      - "50000:50000"
    volumes:
      - jenkins_home:/var/jenkins_home
      - ./jenkins/casc:/var/jenkins_conf:ro
      - ./jenkins/jobs:/var/jenkins_jobs:ro
      - ./pipelines:/workspace/pipelines:ro
      - ./scripts:/workspace/scripts:ro
      - ./repos:/workspace/repos
      - ./app:/workspace/app:ro
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      sonarqube:
        condition: service_healthy
    networks:
      - greencity-ci
  sonarqube:
    image: sonarqube:26.6.0.123539-community
    container_name: greencity-sonarqube
    restart: unless-stopped
    environment:
      SONAR_JDBC_URL: jdbc:postgresql://sonar-db:5432/sonar
      SONAR_JDBC_USERNAME: ${SONAR_DB_USER:-sonar}
      SONAR_JDBC_PASSWORD: ${SONAR_DB_PASSWORD:-sonar}
      SONAR_ES_BOOTSTRAP_CHECKS_DISABLE: "true"
    ports:
      - "9000:9000"
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_extensions:/opt/sonarqube/extensions
      - sonarqube_logs:/opt/sonarqube/logs
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9000/api/system/status | grep -q '\"status\":\"UP\"' || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 40
      start_period: 90s
    depends_on:
      sonar-db:
        condition: service_healthy
    networks:
      - greencity-ci

  sonar-db:
    image: postgres:15-alpine
    container_name: greencity-sonar-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: sonar
      POSTGRES_USER: ${SONAR_DB_USER:-sonar}
      POSTGRES_PASSWORD: ${SONAR_DB_PASSWORD:-sonar}
    volumes:
      - sonar_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${SONAR_DB_USER:-sonar} -d sonar"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - greencity-ci

volumes:
  jenkins_home:
  sonarqube_data:
  sonarqube_extensions:
  sonarqube_logs:
  sonar_db_data:

networks:
  greencity-ci:
    name: greencity-ci
