services:
  postgres:
    image: postgres:15-alpine
    container_name: greencity-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: greencity
      POSTGRES_USER: ${DATASOURCE_USER:-postgres}
      POSTGRES_PASSWORD: ${DATASOURCE_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATASOURCE_USER:-postgres} -d greencity"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - greencity-app

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: greencity-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USERNAME:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - greencity-app

  greencity-core:
    build:
      context: ../repos/GreenCityMVP
      dockerfile: Dockerfile.greencity-ci
    container_name: greencity-core
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -s -o /dev/null http://localhost:8080/v3/api-docs || bash -c '</dev/tcp/localhost/8080' || exit 1"]
      interval: 10s
      timeout: 8s
      retries: 30
      start_period: 120s
    environment:
      DATASOURCE_URL: jdbc:postgresql://postgres:5432/greencity
      DATASOURCE_USER: ${DATASOURCE_USER:-postgres}
      DATASOURCE_PASSWORD: ${DATASOURCE_PASSWORD:-postgres}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_USERNAME: ${RABBITMQ_USERNAME:-guest}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-guest}
      EMAIL_ADDRESS: ${EMAIL_ADDRESS:-}
      EMAIL_PASSWORD: ${EMAIL_PASSWORD:-}
      CLOUD_NAME: ${CLOUD_NAME:-}
      API_KEY: ${API_KEY:-}
      API_SECRET: ${API_SECRET:-}
      BUCKET_NAME: ${BUCKET_NAME:-}
      STATIC_URL: ${STATIC_URL:-}
      AZURE_CONNECTION_STRING: ${AZURE_CONNECTION_STRING:-}
      AZURE_CONTAINER_NAME: ${AZURE_CONTAINER_NAME:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GREENCITYUSER_SERVER_ADDRESS: http://greencity-user:8060
      TOKENKEY: ${TOKEN_KEY:-someVeryLongRandomSecretKeyForLocalDevOnly1234567890}
      MAX_FILE_SIZE: ${MAX_FILE_SIZE:-}
      MAX_REQUEST_SIZE: ${MAX_REQUEST_SIZE:-}
    networks:
      - greencity-app

  greencity-user:
    build:
      context: ../repos/GreenCityUser
      dockerfile: Dockerfile.greencity-ci
    container_name: greencity-user
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      greencity-core:
        condition: service_healthy
    ports:
      - "8060:8060"
    healthcheck:
      test: ["CMD-SHELL", "curl -s -o /dev/null http://localhost:8060/v3/api-docs || bash -c '</dev/tcp/localhost/8060' || exit 1"]
      interval: 10s
      timeout: 8s
      retries: 30
      start_period: 120s
    environment:
      DATASOURCE_URL: jdbc:postgresql://postgres:5432/greencity
      DATASOURCE_USER: ${DATASOURCE_USER:-postgres}
      DATASOURCE_PASSWORD: ${DATASOURCE_PASSWORD:-postgres}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_USERNAME: ${RABBITMQ_USERNAME:-guest}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-guest}
      EMAIL_ADDRESS: ${EMAIL_ADDRESS:-}
      EMAIL_PASSWORD: ${EMAIL_PASSWORD:-}
      CLOUD_NAME: ${CLOUD_NAME:-}
      API_KEY: ${API_KEY:-}
      API_SECRET: ${API_SECRET:-}
      BUCKET_NAME: ${BUCKET_NAME:-}
      STATIC_URL: ${STATIC_URL:-}
      AZURE_CONNECTION_STRING: ${AZURE_CONNECTION_STRING:-}
      AZURE_CONTAINER_NAME: ${AZURE_CONTAINER_NAME:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      FACEBOOK_APP_ID: ${FACEBOOK_APP_ID:-}
      FACEBOOK_APP_SECRET: ${FACEBOOK_APP_SECRET:-}
      GREENCITY_SERVER_ADDRESS: http://greencity-core:8080
      TOKENKEY: ${TOKEN_KEY:-someVeryLongRandomSecretKeyForLocalDevOnly1234567890}
    networks:
      - greencity-app

  greencity-client:
    build:
      context: ../repos/GreenCityClient
      args:
        PRODUCTION: ${PRODUCTION:-true}
        ENABLE_GREENCITY: ${ENABLE_GREENCITY:-true}
        ENABLE_UBS: ${ENABLE_UBS:-false}
        BACKEND_LINK: ${BACKEND_LINK:-http://localhost:8080}
        BACKEND_USER_LINK: ${BACKEND_USER_LINK:-http://localhost:8060}
        BACKEND_CHAT_LINK: ${BACKEND_CHAT_LINK:-http://localhost:8080}
        BACKEND_UBS_LINK: ${BACKEND_UBS_LINK:-http://localhost:8080}
        BACKEND_UBS_ADMIN_LINK: ${BACKEND_UBS_ADMIN_LINK:-http://localhost:8080}
        SOCKET: ${SOCKET:-http://localhost:8080/socket}
        USER_SOCKET: ${USER_SOCKET:-http://localhost:8060/socket}
        UBS_SOCKET: ${UBS_SOCKET:-http://localhost:8080/socket}
        FRONTEND_LINK: ${FRONTEND_LINK:-http://localhost:4200}
        API_KEYS: ${API_KEYS:-}
        API_MAP_KEY: ${API_MAP_KEY:-}
        AGM_CORE_MODULE_API_KEY: ${AGM_CORE_MODULE_API_KEY:-}
        GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      dockerfile: Dockerfile.greencity-ci
    container_name: greencity-client
    restart: unless-stopped
    depends_on:
      greencity-core:
        condition: service_started
    ports:
      - "4200:80"
    networks:
      - greencity-app

volumes:
  pgdata:

networks:
  greencity-app:
    name: greencity-app
