jenkins:
  systemMessage: "GreenCity local dev environment — managed by JCasC. Do not configure by hand."
  numExecutors: 2
  mode: NORMAL
  scmCheckoutRetryCount: 2

  securityRealm:
    local:
      allowsSignup: false
      users:
        - id: "${JENKINS_ADMIN_ID}"
          password: "${JENKINS_ADMIN_PASSWORD}"

  authorizationStrategy:
    loggedInUsersCanDoAnything:
      allowAnonymousRead: false
unclassified:
  sonarGlobalConfiguration:
    buildWrapperEnabled: true
    installations:
      - name: "greencity-sonar"
        serverUrl: "http://sonarqube:9000"
        credentialsId: "sonar-token"
        triggers:
          skipScmCause: false
          skipUpstreamCause: false

credentials:
  system:
    domainCredentials:
      - credentials:
          - string:
              scope: GLOBAL
              id: "sonar-token"
              secret: "${SONAR_TOKEN}"
              description: "SonarQube analysis token"
jobs:
  - file: /var/jenkins_jobs/greencity-jobs.groovy
